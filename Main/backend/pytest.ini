[pytest]
# Markers used across the LLM test suite.
# - mock_llm: tests that use MockLLMProvider (deterministic, no real LLM)
# - live_llm: tests that hit a real Gemini endpoint (opt-in only; requires GEMINI_API_KEY)
markers =
    mock_llm: deterministic LLM tests using MockLLMProvider
    live_llm: live LLM tests requiring Gemini (opt-in via -m live_llm)
# Default: skip live_llm tests so the standard `pytest` run stays deterministic.
addopts = -m "not live_llm"
# Starlette 1.x deprecated httpx in favor of a future "httpx2" package that is
# not yet published on PyPI. Until httpx2 ships, the testclient still works on
# httpx — the warning is informational and adds 1 line of noise to every run.
# Filter it here so the test summary stays clean.
filterwarnings =
    ignore::starlette.exceptions.StarletteDeprecationWarning
